<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatementForge TopBar</title>
    <link rel="stylesheet" href="styles/topbar.css">
    <script src="js/qwebchannel.js"></script>
    <script src="js/bridge.js"></script>
</head>
<body>
    <header class="topbar-container" id="topbar-app">
        <!-- Search Section -->
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="header-search" 
                   placeholder="Search transactions, statements..." 
                   oninput="sendAppCommand('topbar_search', this.value)"
                   onkeydown="if(event.key === 'Enter') sendAppCommand('topbar_search_submit', this.value)">
        </div>

        <!-- Right Side Actions & User Profile -->
        <div class="topbar-right">
            <!-- Theme Toggle Pill Switch Button (Rounded Rectangle & Blue Theme Accent) -->
            <button type="button" class="theme-toggle-switch" id="btn-theme-toggle" 
                    title="Toggle Light / Dark Theme" onclick="sendAppCommand('topbar_theme_toggle', '')">
                <span id="theme-icon-text" style="display:none;">🌙</span>
                <div class="switch-track">
                    <div class="switch-thumb"></div>
                    <div class="switch-icon-box moon-box" title="Dark Mode">
                        <svg class="theme-svg moon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </div>
                    <div class="switch-icon-box sun-box" title="Light Mode">
                        <svg class="theme-svg sun-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </div>
                </div>
            </button>

            <!-- Notifications Button -->
            <button type="button" class="icon-button" id="btn-notifications" 
                    title="Notifications" onclick="sendAppCommand('topbar_notification', '')">
                <img src="../assets/icons/bell.png" alt="Notifications" class="btn-icon-img">
                <span class="notification-badge-dot"></span>
            </button>

            <!-- User Profile Pill -->
            <div class="profile-pill" id="user-profile-pill" onclick="sendAppCommand('topbar_profile', '')">
                <div class="avatar-circle" id="user-avatar">U</div>
                <span class="username-text" id="user-name">User</span>
                <span class="dropdown-arrow">▼</span>
            </div>
        </div>
    </header>
</body>
</html>
