<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4">
<!-- Back Button (Contextual) -->
<div class="fixed top-8 left-8">
<button class="flex items-center gap-2 px-4 py-2 border border-outline-variant rounded bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-colors font-body-sm">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Back
        </button>
</div>
<!-- Login Container -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_4px_6px_-1px_rgb(0,0,0,0.1)] border border-outline-variant overflow-hidden">
<!-- Top Accent Bar -->
<div class="h-1 bg-primary w-full"></div>
<div class="p-8 sm:p-10">
<!-- Header -->
<div class="text-center mb-8">
<!-- Logo -->
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container text-on-primary rounded-2xl mb-6">
<span class="material-symbols-outlined text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Login to manage and parse your statements.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-5" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-bold text-label-bold text-on-surface mb-1.5" for="email">Email Address</label>
<input class="w-full h-9 px-3 border border-outline-variant rounded bg-surface-bright text-on-surface font-body-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" id="email" name="email" placeholder="Enter your email" required="" type="email">
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-1.5">
<label class="block font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-9 px-3 pr-10 border border-outline-variant rounded bg-surface-bright text-on-surface font-body-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" id="password" name="password" placeholder="Enter your password" required="" type="password">
<button class="absolute inset-y-0 right-0 px-3 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface-bright" id="remember-me" name="remember-me" type="checkbox">
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                        Remember this device
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full h-10 flex justify-center items-center bg-primary-container text-on-primary font-label-bold text-label-bold rounded hover:bg-primary transition-colors mt-2" type="submit">
                    Login to Account
                </button>
</form>
<!-- Divider -->
<div class="mt-8 mb-6 relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center">
<span class="px-3 bg-surface-container-lowest font-body-sm text-body-sm text-on-surface-variant">or</span>
</div>
</div>
<!-- Social Auth -->
<button class="w-full h-10 flex justify-center items-center gap-3 bg-surface-container-lowest border border-outline-variant text-on-surface font-body-sm text-body-sm rounded hover:bg-surface-container-low transition-colors" type="button">
<!-- SVG Google Icon for generic use -->
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
<!-- Footer Link -->
<p class="mt-8 text-center font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="font-label-bold text-label-bold text-primary hover:underline" href="#">Register Now</a>
</p>
</div>
</div>
